name: Java CI with JaCoCo Quality Gate

on:
  push:
    branches: [ "main", "feature/aseguramiento-calidad" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Tests with Maven
        run: mvn clean test

      - name: Verify JaCoCo Report Generation
        run: |
          if [ ! -f target/site/jacoco/index.html ]; then
            echo "Error: El reporte de cobertura de JaCoCo no fue generado."
            exit 1
          fi
          echo "¡Quality Gate Exitoso! El reporte de JaCoCo se generó correctamente."